<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>GYM LOG</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f; color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; -webkit-tap-highlight-color: transparent;
    }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #0a0a0f; padding-bottom: 90px; }
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 24px 20px 20px; border-bottom: 2px solid #e8474722;
      position: sticky; top: 0; z-index: 100;
    }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 3px; color: #e84747; }
    .header-sub { font-size: 0.72rem; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
    .btn { border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; transition: all 0.18s; display: inline-flex; align-items: center; gap: 6px; border-radius: 10px; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: #e84747; color: #fff; padding: 13px 22px; font-size: 0.9rem; width: 100%; justify-content: center; border-radius: 12px; box-shadow: 0 4px 20px #e8474733; }
    .btn-secondary { background: #1e1e2e; color: #bbb; padding: 10px 16px; font-size: 0.82rem; border: 1px solid #2a2a3e; }
    .btn-ghost { background: transparent; color: #888; padding: 8px 12px; font-size: 0.9rem; }
    .btn-danger { background: #2a1010; color: #e84747; padding: 8px 12px; font-size: 0.82rem; border: 1px solid #3a1a1a; }
    .section { padding: 20px; }
    .card { background: #12121e; border: 1px solid #1e1e2e; border-radius: 16px; overflow: hidden; margin-bottom: 14px; }
    .card-header { padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; background: #14142a; border-bottom: 1px solid #1e1e2e; }
    .card-date { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; color: #e0ddd8; }
    .card-time { font-size: 0.78rem; color: #e84747; background: #e8474715; border: 1px solid #e8474730; padding: 3px 8px; border-radius: 6px; font-weight: 600; }
    .card-body { padding: 14px 18px; }
    .exercise-chip { display: inline-flex; align-items: center; gap: 6px; background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 8px; padding: 5px 10px; font-size: 0.78rem; color: #ccc; margin: 3px 3px 3px 0; }
    .exercise-chip strong { color: #fff; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; margin: 2px; }
    .badge-sauna { background: #2a1a00; color: #ff9500; border: 1px solid #ff950040; }
    .badge-turco { background: #001a2a; color: #00aaff; border: 1px solid #00aaff40; }
    .card-actions { padding: 12px 18px; display: flex; gap: 8px; border-top: 1px solid #1a1a2e; flex-wrap: wrap; }
    .form-section { padding: 0 20px 20px; }
    .form-row { display: grid; gap: 12px; margin-bottom: 14px; }
    .form-row-2 { grid-template-columns: 1fr 1fr; }
    .form-row-3 { grid-template-columns: 1fr 1fr 1fr; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.5px; color: #666; font-weight: 600; }
    .field input { background: #12121e; border: 1.5px solid #1e1e2e; border-radius: 10px; color: #f0ede8; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 11px 14px; outline: none; transition: border-color 0.18s; width: 100%; -webkit-appearance: none; }
    .field input:focus { border-color: #e84747; }
    .field input::placeholder { color: #333; }
    .exercise-form { background: #12121e; border: 1.5px solid #1e1e2e; border-radius: 14px; padding: 16px; margin-bottom: 10px; }
    .exercise-num { font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; letter-spacing: 2px; color: #e84747; margin-bottom: 10px; }
    .toggle-group { display: flex; gap: 10px; margin-bottom: 16px; }
    .toggle-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1.5px solid #1e1e2e; background: #0e0e1a; color: #555; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.18s; text-align: center; font-family: 'DM Sans', sans-serif; }
    .toggle-btn.active-sauna { background: #1a1000; border-color: #ff9500; color: #ff9500; }
    .toggle-btn.active-turco { background: #00111a; border-color: #00aaff; color: #00aaff; }
    .divider { height: 1px; background: #1a1a2e; margin: 20px 0; }
    .section-label { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 3px; color: #444; margin-bottom: 12px; }
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 2px; color: #333; }
    .empty-sub { font-size: 0.82rem; color: #444; margin-top: 6px; }
    .back-btn { display: flex; align-items: center; gap: 8px; background: none; border: none; color: #888; font-size: 0.9rem; cursor: pointer; padding: 20px 20px 0; font-family: 'DM Sans', sans-serif; }
    .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; padding: 8px 20px 0; color: #f0ede8; }
    .fab { position: fixed; bottom: 24px; right: 24px; width: 58px; height: 58px; border-radius: 50%; background: #e84747; color: #fff; font-size: 1.6rem; border: none; cursor: pointer; box-shadow: 0 6px 24px #e8474766; display: flex; align-items: center; justify-content: center; z-index: 200; transition: all 0.18s; }
    .fab:active { transform: scale(0.92); }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e3a1e; border: 1px solid #2a5a2a; color: #6fc96f; padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; z-index: 300; animation: fadeInOut 2.5s forwards; white-space: nowrap; }
    @keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(10px)} 15%{opacity:1;transform:translateX(-50%) translateY(0)} 75%{opacity:1} 100%{opacity:0} }
    .copy-list { padding: 12px 16px; }
    .copy-item { background: #12121e; border: 1.5px solid #1e1e2e; border-radius: 14px; margin-bottom: 10px; padding: 16px; cursor: pointer; transition: all 0.18s; }
    .copy-item:active { border-color: #e84747; background: #16162a; }
    .copy-item-date { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: #fff; margin-bottom: 4px; }
    .copy-item-sub { font-size: 0.78rem; color: #666; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    .full-page { position: fixed; inset: 0; background: #0a0a0f; z-index: 150; overflow-y: auto; padding-bottom: 40px; max-width: 480px; margin: 0 auto; }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- Rendered by JS -->
</div>

<script>
const DB_KEY = "gym_tracker_workouts";

function loadWorkouts() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || []; } catch { return []; }
}
function saveWorkouts(data) {
  try { localStorage.setItem(DB_KEY, JSON.stringify(data)); } catch {}
}
function emptyExercise() {
  return { id: Date.now() + Math.random(), nome: "", series: "", reps: "", carga: "" };
}
function emptyWorkout() {
  const now = new Date();
  return {
    id: Date.now(),
    data: now.toISOString().slice(0,10),
    hora: now.toTimeString().slice(0,5),
    exercicios: [emptyExercise()],
    sauna: false, banhoTurco: false
  };
}
function formatDate(s) {
  if (!s) return "";
  const [y,m,d] = s.split("-"); return `${d}/${m}/${y}`;
}

let state = {
  workouts: loadWorkouts(),
  view: "list",
  form: null,
  editingId: null,
  toast: "",
  toastTimer: null
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function showToast(msg) {
  if (state.toastTimer) clearTimeout(state.toastTimer);
  const timer = setTimeout(() => setState({ toast: "", toastTimer: null }), 2600);
  setState({ toast: msg, toastTimer: timer });
}

function saveForm() {
  const form = state.form;
  const filtered = { ...form, exercicios: form.exercicios.filter(e => e.nome.trim()) };
  let updated;
  if (state.editingId) {
    updated = state.workouts.map(w => w.id === state.editingId ? filtered : w);
  } else {
    updated = [filtered, ...state.workouts];
  }
  saveWorkouts(updated);
  setState({ workouts: updated, view: "list", form: null, editingId: null });
  showToast(state.editingId ? "Treino atualizado! 💪" : "Treino guardado! 💪");
}

function deleteWorkout(id) {
  if (!confirm("Apagar este treino?")) return;
  const updated = state.workouts.filter(w => w.id !== id);
  saveWorkouts(updated);
  setState({ workouts: updated });
  showToast("Treino apagado");
}

function copyWorkout(w) {
  const copied = JSON.parse(JSON.stringify(w));
  copied.id = Date.now();
  const now = new Date();
  copied.data = now.toISOString().slice(0,10);
  copied.hora = now.toTimeString().slice(0,5);
  copied.exercicios = copied.exercicios.map(e => ({ ...e, id: Date.now() + Math.random() }));
  setState({ form: copied, editingId: null, view: "form" });
  showToast("Treino copiado! Edita à vontade ✏️");
}

function updateFormField(field, value) {
  setState({ form: { ...state.form, [field]: value } });
}

function updateExercise(idx, field, value) {
  const exs = [...state.form.exercicios];
  exs[idx] = { ...exs[idx], [field]: value };
  setState({ form: { ...state.form, exercicios: exs } });
}

function addExercise() {
  setState({ form: { ...state.form, exercicios: [...state.form.exercicios, emptyExercise()] } });
}

function removeExercise(idx) {
  let exs = state.form.exercicios.filter((_, i) => i !== idx);
  if (!exs.length) exs = [emptyExercise()];
  setState({ form: { ...state.form, exercicios: exs } });
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  // Header
  const header = el("div", "header", `
    <div class="header-title">🏋️ GYM LOG</div>
    <div class="header-sub">O teu diário de treino</div>
  `);
  app.appendChild(header);

  if (state.view === "list") renderList(app);
  else if (state.view === "form") renderForm(app);
  else if (state.view === "copy") renderCopy(app);

  if (state.toast) {
    const toast = el("div", "toast", state.toast);
    app.appendChild(toast);
  }

  // Re-attach all listeners
  attachListeners();
}

function el(tag, cls, html) {
  const e = document.createElement(tag);
  e.className = cls;
  if (html) e.innerHTML = html;
  return e;
}

function renderList(app) {
  const section = el("div", "section");
  if (state.workouts.length === 0) {
    section.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏋️</div>
        <div class="empty-title">Sem treinos ainda</div>
        <div class="empty-sub">Toca no + para registar o teu primeiro treino</div>
      </div>`;
  } else {
    state.workouts.forEach(w => {
      const exChips = w.exercicios.filter(e => e.nome.trim()).map(e =>
        `<div class="exercise-chip"><strong>${e.nome}</strong>${e.series ? `<span>${e.series}s</span>` : ""}${e.reps ? `<span>× ${e.reps}r</span>` : ""}${e.carga ? `<span>· ${e.carga}kg</span>` : ""}</div>`
      ).join("");
      const badges = [
        w.sauna ? `<span class="badge badge-sauna">🧖 Sauna</span>` : "",
        w.banhoTurco ? `<span class="badge badge-turco">💨 Banho Turco</span>` : ""
      ].join("");

      const card = el("div", "card");
      card.innerHTML = `
        <div class="card-header">
          <div class="card-date">📅 ${formatDate(w.data)}</div>
          <div class="card-time">⏰ ${w.hora}</div>
        </div>
        <div class="card-body">
          <div class="section-label">Exercícios</div>
          ${exChips || '<span style="color:#444;font-size:0.8rem">Sem exercícios registados</span>'}
          ${badges ? `<div style="margin-top:10px">${badges}</div>` : ""}
        </div>
        <div class="card-actions">
          <button class="btn btn-secondary" onclick="editWorkout(${w.id})">✏️ Editar</button>
          <button class="btn btn-secondary" onclick="copyWorkoutById(${w.id})">📋 Copiar</button>
          <button class="btn btn-danger" onclick="deleteWorkout(${w.id})">🗑️</button>
        </div>`;
      section.appendChild(card);
    });
  }
  app.appendChild(section);

  // FAB
  const fab = el("button", "fab");
  fab.innerHTML = "+";
  fab.title = "Novo treino";
  fab.onclick = () => setState({ form: emptyWorkout(), editingId: null, view: "form" });
  app.appendChild(fab);
}

function renderForm(app) {
  const f = state.form;

  const backBtn = document.createElement("button");
  backBtn.className = "back-btn";
  backBtn.innerHTML = "← Voltar";
  backBtn.onclick = () => setState({ view: "list", form: null, editingId: null });
  app.appendChild(backBtn);

  const title = el("div", "page-title", state.editingId ? "Editar Treino" : "Novo Treino");
  app.appendChild(title);

  const fs = el("div", "form-section");
  fs.style.marginTop = "16px";

  // Date + Time
  fs.innerHTML += `
    <div class="form-row form-row-2">
      <div class="field">
        <label>📅 Data</label>
        <input type="date" id="f-data" value="${f.data}" />
      </div>
      <div class="field">
        <label>⏰ Hora de Início</label>
        <input type="time" id="f-hora" value="${f.hora}" />
      </div>
    </div>
    <div class="divider"></div>
    <div class="section-label">🏋️ Exercícios</div>
  `;

  // Exercises
  f.exercicios.forEach((ex, idx) => {
    fs.innerHTML += `
      <div class="exercise-form">
        <div class="exercise-num">EXERCÍCIO ${idx + 1}</div>
        <div class="field" style="margin-bottom:10px">
          <label>Nome do Exercício</label>
          <input type="text" placeholder="Ex: Supino, Agachamento..." data-ex="${idx}" data-field="nome" value="${ex.nome}" />
        </div>
        <div class="form-row form-row-3">
          <div class="field"><label>Séries</label><input type="number" placeholder="4" data-ex="${idx}" data-field="series" value="${ex.series}" /></div>
          <div class="field"><label>Reps</label><input type="number" placeholder="12" data-ex="${idx}" data-field="reps" value="${ex.reps}" /></div>
          <div class="field"><label>Carga (kg)</label><input type="number" placeholder="80" data-ex="${idx}" data-field="carga" value="${ex.carga}" /></div>
        </div>
        ${f.exercicios.length > 1 ? `<button class="btn btn-danger" style="font-size:0.75rem;padding:6px 10px" onclick="removeExercise(${idx})">🗑️ Remover exercício</button>` : ""}
      </div>`;
  });

  fs.innerHTML += `
    <button class="btn btn-secondary" style="width:100%;justify-content:center;margin-bottom:16px" onclick="addExercise()">➕ Adicionar exercício</button>
    <div class="divider"></div>
    <div class="section-label">♨️ Recuperação</div>
    <div class="toggle-group">
      <button class="toggle-btn ${f.sauna ? 'active-sauna' : ''}" id="toggle-sauna">🧖 Sauna${f.sauna ? " ✓" : ""}</button>
      <button class="toggle-btn ${f.banhoTurco ? 'active-turco' : ''}" id="toggle-turco">💨 Banho Turco${f.banhoTurco ? " ✓" : ""}</button>
    </div>
    <button class="btn btn-primary" onclick="saveForm()">💾 Guardar Treino</button>
  `;

  app.appendChild(fs);
}

function renderCopy(app) {
  const page = el("div", "full-page");
  page.innerHTML = `
    <div class="card-header" style="background:#12121e;padding:20px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:12px">
      <button class="btn btn-ghost" onclick="setState({view:'list'})">←</button>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px">Escolhe um treino para copiar</div>
    </div>
    <div class="copy-list">
      ${state.workouts.length === 0
        ? `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Sem treinos para copiar</div></div>`
        : state.workouts.map(w => `
          <div class="copy-item" onclick="copyWorkoutById(${w.id})">
            <div class="copy-item-date">📅 ${formatDate(w.data)} — ⏰ ${w.hora}</div>
            <div class="copy-item-sub">${w.exercicios.filter(e=>e.nome.trim()).map(e=>e.nome).join(", ") || "Sem exercícios"}${(w.sauna||w.banhoTurco) ? " · "+[w.sauna&&"Sauna",w.banhoTurco&&"Banho Turco"].filter(Boolean).join(" + ") : ""}</div>
          </div>`).join("")}
    </div>`;
  app.appendChild(page);
}

function attachListeners() {
  // Date/time inputs in form
  const fData = document.getElementById("f-data");
  const fHora = document.getElementById("f-hora");
  if (fData) fData.addEventListener("change", e => updateFormField("data", e.target.value));
  if (fHora) fHora.addEventListener("change", e => updateFormField("hora", e.target.value));

  // Exercise inputs
  document.querySelectorAll("[data-ex]").forEach(input => {
    input.addEventListener("input", e => {
      const idx = parseInt(e.target.dataset.ex);
      const field = e.target.dataset.field;
      updateExercise(idx, field, e.target.value);
    });
  });

  // Sauna / Turco toggles
  const ts = document.getElementById("toggle-sauna");
  const tt = document.getElementById("toggle-turco");
  if (ts) ts.addEventListener("click", () => updateFormField("sauna", !state.form.sauna));
  if (tt) tt.addEventListener("click", () => updateFormField("banhoTurco", !state.form.banhoTurco));
}

// Global helpers for inline onclick
window.editWorkout = (id) => {
  const w = state.workouts.find(x => x.id === id);
  if (w) setState({ form: JSON.parse(JSON.stringify(w)), editingId: id, view: "form" });
};
window.copyWorkoutById = (id) => {
  const w = state.workouts.find(x => x.id === id);
  if (w) copyWorkout(w);
};
window.deleteWorkout = deleteWorkout;
window.saveForm = saveForm;
window.addExercise = addExercise;
window.removeExercise = removeExercise;
window.setState = setState;

// Boot
render();
</script>
</body>
</html>
